name: Publish to Test PyPI

# This workflow publishes to Test PyPI for testing before production release
# Trigger it manually from the Actions tab

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for publishing to Test PyPI'
        required: false
        default: 'Testing package before production release'

jobs:
  build-and-publish-test:
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/memograph/

    permissions:
      # IMPORTANT: This is required for Trusted Publishing (OIDC)
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          print-hash: true

      - name: Test installation from Test PyPI
        run: |
          echo "✅ Package published to Test PyPI!"
          echo "Test installation with:"
          echo "pip install --index-url https://test.pypi.org/simple/ memograph"
          echo ""
          echo "View your package at: https://test.pypi.org/project/memograph/"
