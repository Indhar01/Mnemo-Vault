# Ruff configuration for MemoGraph
# Ignore certain rules that are too strict or not applicable

[lint]
# Ignore B904 (exception chaining) as it's a style preference
# Ignore ARG001/ARG002 (unused arguments) for framework callbacks
# Ignore SIM115 (context manager) for legacy code
ignore = [
    "B904",   # Within an except clause, raise exceptions with raise ... from err
    "ARG001", # Unused function argument
    "ARG002", # Unused method argument
    "SIM115", # Use context manager for opening files
]

[lint.per-file-ignores]
# Allow unused imports in __init__.py files
"__init__.py" = ["F401"]
# Allow temp files to have any issues
"temp_*.py" = ["ALL"]
