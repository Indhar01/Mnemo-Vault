[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
disallow_incomplete_defs = False
check_untyped_defs = True
disallow_untyped_calls = False
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_optional = True
no_implicit_optional = True

# Ignore errors in specific files that need refactoring
[mypy-memograph.storage.cache_enhanced]
ignore_errors = True

[mypy-memograph.core.action_logger]
ignore_errors = True

[mypy-memograph.core.graph_enhanced]
ignore_errors = True

[mypy-memograph.core.logging_config]
ignore_errors = True

[mypy-memograph.core.kernel_enhanced]
ignore_errors = True

[mypy-memograph.core.kernel_async]
ignore_errors = True

[mypy-memograph.core.kernel_batch]
ignore_errors = True

[mypy-memograph.core.kernel_gam_async]
ignore_errors = True

[mypy-memograph.web.backend.errors]
ignore_errors = True

[mypy-memograph.web.backend.routes.search]
ignore_errors = True

[mypy-memograph.web.backend.routes.memories]
ignore_errors = True
